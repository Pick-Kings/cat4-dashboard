<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CAT4 Progress Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--surface:#181c27;--card:#1e2333;--border:#2a3050;
    --accent:#5b8dee;--accent-soft:rgba(91,141,238,0.13);
    --green:#4ade80;--amber:#fbbf24;--rose:#f87171;
    --verbal:#818cf8;--nv:#34d399;--spatial:#fb923c;--quant:#f472b6;
    --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  }
  html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* Layout */
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
  #logo{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:-0.3px}
  #logo span{color:var(--muted);font-weight:400}
  #body{display:flex;flex:1;overflow:hidden}
  #sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  #main{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}

  /* Header controls */
  .hdr-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .toggle-group{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
  .toggle-btn{padding:4px 12px;border-radius:14px;border:none;font-size:11px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s}
  .toggle-btn.active{background:var(--accent);color:#fff}
  .tab-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;transition:all .15s}
  .tab-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .upload-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:600}
  .storage-badge{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid transparent}
  .storage-badge.saved{color:var(--green);background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.25)}
  .storage-badge.empty{color:var(--muted);background:var(--surface);border-color:var(--border)}
  .clear-btn{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:transparent;color:var(--rose)}

  /* Sidebar */
  #sb-search{padding:10px 10px 6px}
  #sb-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;outline:none}
  #sb-tree{flex:1;overflow-y:auto;padding:0 6px 6px}
  #sb-upload{padding:8px 10px 10px;border-top:1px solid var(--border);margin-top:auto}
  .year-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:7px;border:none;background:transparent;color:var(--muted2);font-size:12px;font-weight:700;text-align:left;transition:all .12s;margin-bottom:1px}
  .year-btn.open{background:var(--accent-soft);color:var(--accent)}
  .year-badge{background:var(--border);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;color:var(--muted)}
  .stu-btn{width:100%;padding:6px 9px 6px 20px;border-radius:7px;border:1px solid transparent;background:transparent;text-align:left;font-size:11px;color:var(--muted2);margin-bottom:1px;transition:all .1s;display:block}
  .stu-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
  .stu-btn .sname{display:block;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stu-btn .sscore{font-size:10px;color:var(--muted)}
  .nocat4-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:7px;border:none;background:transparent;color:var(--rose);font-size:12px;font-weight:700;text-align:left;margin-bottom:1px}
  .nocat4-item{padding:5px 9px 5px 20px;font-size:11px;color:var(--muted)}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-soft)}
  .upload-zone .uz-icon{font-size:16px;margin-bottom:2px}
  .upload-zone .uz-label{font-size:11px;color:var(--accent);font-weight:600}
  .upload-zone .uz-sub{font-size:10px;color:var(--muted);margin-top:1px}
  .upload-zone .uz-ok{font-size:10px;color:var(--green);margin-top:3px}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
  .card-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* Student header */
  .stu-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
  .stu-name{font-size:22px;font-weight:700;margin-bottom:3px}
  .stu-meta{font-size:12px;color:var(--muted)}
  .stu-meta strong{color:var(--text)}
  .stat-pills{display:flex;gap:8px;flex-wrap:wrap}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 14px;min-width:85px}
  .stat-pill .sp-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat-pill .sp-value{font-size:20px;font-weight:700;font-family:'Courier New',monospace;margin:2px 0}
  .stat-pill .sp-sub{font-size:9px;color:var(--muted)}

  /* Domain cards */
  .domain-cards{display:flex;gap:8px;flex-wrap:wrap}
  .domain-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 14px;flex:1 1 100px}
  .dc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .dc-score{font-size:24px;font-weight:800;font-family:'Courier New',monospace}
  .dc-sub{font-size:10px;color:var(--muted);margin-top:1px}
  .dc-diff{font-size:10px;font-weight:600;margin-top:4px}

  /* Table */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:6px 9px;border-bottom:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}
  td{padding:8px 9px;border-bottom:1px solid var(--border);font-family:'Courier New',monospace}
  tr.clickable{cursor:pointer}
  tr.clickable:hover td{background:rgba(91,141,238,.05)}
  td.nm{font-family:'Segoe UI',sans-serif;font-weight:600}
  td.yr{font-family:'Segoe UI',sans-serif;color:var(--muted)}

  /* Trend */
  .trend-up{color:var(--green);font-weight:700}
  .trend-dn{color:var(--rose);font-weight:700}
  .trend-na{color:var(--muted)}

  /* Band pill */
  .band{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;font-family:'Segoe UI',sans-serif}

  /* Cohort sidebar */
  #csb-tree{flex:1;overflow-y:auto;padding:6px}
  .cohort-yr-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted2);font-size:12px;font-weight:600;text-align:left;margin-bottom:2px;transition:all .12s}
  .cohort-yr-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--text);font-weight:700}

  /* Charts */
  .chart-wrap{position:relative}

  /* Modal */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
  #modal-overlay.show{display:flex}
  #modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
  .col-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
  .col-tag{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:11px;font-family:'Courier New',monospace}
  .req-table td{padding:5px 7px;border-bottom:1px solid var(--border);font-size:11px}
  .req-table td:first-child{font-weight:600;white-space:nowrap;font-family:'Segoe UI',sans-serif}
  .req-table td:last-child{color:var(--muted);font-family:'Courier New',monospace;font-size:10px}
  .modal-btn{margin-top:12px;width:100%;padding:9px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:13px}

  /* Responsive */
  @media(max-width:700px){
    #sidebar{width:180px;min-width:180px}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="logo">CAT4 <span>Progress Dashboard</span></div>
    <div class="hdr-controls">
      <span id="storage-badge" class="storage-badge empty">No saved data — upload a file</span>
      <button id="clear-btn" class="clear-btn" style="display:none" onclick="clearData()">Clear data</button>
      <div class="toggle-group">
        <button class="toggle-btn active" id="bench-national" onclick="setBenchmark('national')">National Norm</button>
        <button class="toggle-btn" id="bench-cohort" onclick="setBenchmark('cohort')">School Cohort</button>
      </div>
      <div style="display:flex;gap:5px">
        <button class="tab-btn active" id="tab-student" onclick="setView('student')">Student View</button>
        <button class="tab-btn" id="tab-cohort" onclick="setView('cohort')">Cohort Overview</button>
      </div>
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">↑ Upload Files</button>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)"/>
    </div>
  </div>

  <!-- Body -->
  <div id="body">
    <!-- Student Sidebar -->
    <div id="sidebar" class="student-sidebar">
      <div id="sb-search">
        <input type="text" id="search-input" placeholder="Search students…" oninput="renderSidebar()"/>
      </div>
      <div id="sb-tree"></div>
      <div id="sb-upload">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="event.preventDefault();this.classList.remove('drag');handleFiles(event.dataTransfer.files)">
          <div class="uz-icon">📂</div>
          <div class="uz-label">Drop or click to upload</div>
          <div class="uz-sub">CSV / Excel · extra columns OK</div>
          <div class="uz-ok" id="upload-ok" style="display:none"></div>
        </div>
      </div>
    </div>

    <!-- Main panel -->
    <div id="main"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="modal-title-text"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <button class="modal-btn" onclick="closeModal()" id="modal-btn-text">View Dashboard</button>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const DOMAINS = ['Verbal','Non-Verbal','Spatial','Quantitative'];
const D_COLORS = ['#818cf8','#34d399','#fb923c','#f472b6'];
const STANINE_LABEL = ['','Very Low','Very Low','Below Avg','Below Avg','Average','Above Avg','Above Avg','High','Very High'];
const NATIONAL_NORM = {Verbal:100,'Non-Verbal':100,Spatial:100,Quantitative:100};
const STORAGE_KEY = 'cat4dash';
const SAMPLE_IDS = new Set(['S001','S002','S003','S004','S005','S006','S007']);

const SAMPLE_DATA = [
  {id:'S001',name:'Aisha Rahman',currentYear:'Year 7',testDate:'2021-09-15',Verbal:112,'Non-Verbal':118,Spatial:109,Quantitative:115},
  {id:'S001',name:'Aisha Rahman',currentYear:'Year 9',testDate:'2023-09-12',Verbal:120,'Non-Verbal':124,Spatial:116,Quantitative:121},
  {id:'S002',name:'Ben Hartley',currentYear:'Year 7',testDate:'2021-09-15',Verbal:98,'Non-Verbal':104,Spatial:112,Quantitative:100},
  {id:'S002',name:'Ben Hartley',currentYear:'Year 9',testDate:'2023-09-12',Verbal:103,'Non-Verbal':108,Spatial:118,Quantitative:107},
  {id:'S003',name:'Clara Müller',currentYear:'Year 8',testDate:'2022-09-14',Verbal:126,'Non-Verbal':119,Spatial:105,Quantitative:122},
  {id:'S003',name:'Clara Müller',currentYear:'Year 10',testDate:'2024-09-10',Verbal:131,'Non-Verbal':125,Spatial:110,Quantitative:128},
  {id:'S004',name:'David Osei',currentYear:'Year 7',testDate:'2022-09-14',Verbal:88,'Non-Verbal':95,Spatial:93,Quantitative:90},
  {id:'S004',name:'David Osei',currentYear:'Year 9',testDate:'2024-09-10',Verbal:94,'Non-Verbal':101,Spatial:99,Quantitative:96},
  {id:'S005',name:'Emma Johansson',currentYear:'Year 9',testDate:'2022-09-14',Verbal:115,'Non-Verbal':110,Spatial:120,Quantitative:108},
  {id:'S005',name:'Emma Johansson',currentYear:'Year 11',testDate:'2024-09-10',Verbal:119,'Non-Verbal':114,Spatial:127,Quantitative:112},
  {id:'S006',name:'Faris Al-Amin',currentYear:'Year 8',testDate:'2021-09-15',Verbal:107,'Non-Verbal':113,Spatial:116,Quantitative:119},
  {id:'S006',name:'Faris Al-Amin',currentYear:'Year 10',testDate:'2023-09-12',Verbal:112,'Non-Verbal':117,Spatial:122,Quantitative:125},
  {id:'S007',name:'Grace Lee',currentYear:'Year 7',testDate:null,Verbal:null,'Non-Verbal':null,Spatial:null,Quantitative:null},
];

// ── State ────────────────────────────────────────────────────────────────────
let rawRows = [...SAMPLE_DATA];
let selectedId = 'S001';
let currentView = 'student';
let benchmarkMode = 'national';
let expandedYears = new Set();
let expandedCohortYear = null;
let fileCount = 0;
let chartInstances = {};

// ── Helpers ───────────────────────────────────────────────────────────────────
function ssToStanine(ss){
  if(ss>=126)return 9;if(ss>=119)return 8;if(ss>=112)return 7;
  if(ss>=104)return 6;if(ss>=97)return 5;if(ss>=89)return 4;
  if(ss>=82)return 3;if(ss>=74)return 2;return 1;
}
function meanSS(row){
  const v=DOMAINS.map(d=>row[d]).filter(x=>x!==null&&!isNaN(x));
  return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;
}
function hasCAT4(row){return DOMAINS.some(d=>row[d]!==null&&!isNaN(row[d]));}
function trendDelta(rows){
  const v=rows.filter(hasCAT4).sort((a,b)=>new Date(a.testDate)-new Date(b.testDate));
  if(v.length<2)return null;
  return meanSS(v[v.length-1])-meanSS(v[0]);
}
function bandColor(ss){return ss>=112?'var(--green)':ss>=97?'var(--amber)':'var(--rose)';}
function bandLabel(ss){return ss>=112?'High':'var(--amber)'===bandColor(ss)?'Average':'Low';}
function fmtDate(d){
  if(!d)return '—';
  const dt=new Date(d);
  return isNaN(dt)?String(d):dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function yearSortKey(y){const m=String(y).match(/(\d+)/);return m?parseInt(m[1]):999;}
function cohortAvg(rows){
  const a={};
  DOMAINS.forEach(d=>{const v=rows.map(r=>r[d]).filter(x=>x!==null&&!isNaN(x));a[d]=v.length?Math.round(v.reduce((s,x)=>s+x,0)/v.length):100;});
  return a;
}
function getBenchmark(){
  if(benchmarkMode==='national')return NATIONAL_NORM;
  return cohortAvg(rawRows.filter(hasCAT4));
}
function getBenchmarkLabel(){return benchmarkMode==='national'?'National Norm':'School Cohort Avg';}

// ── Data structures ───────────────────────────────────────────────────────────
function buildStudentMap(){
  const map={};
  rawRows.forEach(r=>{
    if(!map[r.id])map[r.id]={id:r.id,name:r.name,currentYear:r.currentYear,rows:[]};
    map[r.id].rows.push(r);
  });
  return map;
}
function getAllStudents(){return Object.values(buildStudentMap()).filter(s=>s.rows.some(hasCAT4));}
function getNoCAT4Students(){
  return Object.values(buildStudentMap()).filter(s=>!s.rows.some(hasCAT4))
    .map(s=>({...s,currentYear:s.rows[0]?.currentYear||'Unknown'}))
    .sort((a,b)=>a.name.localeCompare(b.name));
}
function byYear(students){
  const map={};
  students.forEach(s=>{
    const lr=s.rows.filter(hasCAT4).sort((a,b)=>new Date(b.testDate)-new Date(a.testDate))[0];
    const yr=lr?lr.currentYear:(s.currentYear||'Unknown');
    if(!map[yr])map[yr]=[];
    map[yr].push(s);
  });
  Object.values(map).forEach(arr=>arr.sort((a,b)=>a.name.localeCompare(b.name)));
  return map;
}

// ── Storage ───────────────────────────────────────────────────────────────────
function saveData(rows){
  try{
    const str=JSON.stringify(rows);
    const chunkSize=500000;
    const chunks=Math.ceil(str.length/chunkSize);
    localStorage.setItem(STORAGE_KEY+'_n',String(chunks));
    for(let i=0;i<chunks;i++)localStorage.setItem(STORAGE_KEY+'_'+i,str.slice(i*chunkSize,(i+1)*chunkSize));
  }catch(e){console.warn('Storage save failed',e);}
}
function loadData(){
  try{
    const n=parseInt(localStorage.getItem(STORAGE_KEY+'_n')||'0');
    if(!n)return null;
    let str='';
    for(let i=0;i<n;i++)str+=localStorage.getItem(STORAGE_KEY+'_'+i)||'';
    return str?JSON.parse(str):null;
  }catch(e){return null;}
}
function clearData(){
  if(!confirm('Clear all saved data and return to sample data?'))return;
  try{
    const n=parseInt(localStorage.getItem(STORAGE_KEY+'_n')||'0');
    for(let i=0;i<n;i++)localStorage.removeItem(STORAGE_KEY+'_'+i);
    localStorage.removeItem(STORAGE_KEY+'_n');
  }catch(e){}
  rawRows=[...SAMPLE_DATA];
  selectedId='S001';
  fileCount=0;
  updateStorageBadge(false);
  render();
}
function updateStorageBadge(saved){
  const badge=document.getElementById('storage-badge');
  const clearBtn=document.getElementById('clear-btn');
  if(saved){
    badge.className='storage-badge saved';
    badge.textContent='💾 Data saved in browser';
    clearBtn.style.display='';
  }else{
    badge.className='storage-badge empty';
    badge.textContent='No saved data — upload a file';
    clearBtn.style.display='none';
  }
}

// ── Column normaliser ─────────────────────────────────────────────────────────
function norm(s){return String(s).toLowerCase().replace(/[^a-z0-9]/g,'');}
function normaliseRow(r){
  const get=(...keys)=>{
    for(const k of keys){
      const found=Object.keys(r).find(rk=>norm(rk)===norm(k));
      if(found!==undefined&&r[found]!==''&&r[found]!==undefined)return r[found];
    }
    return undefined;
  };
  const firstname=get('firstname','forename','givenname');
  const lastname=get('lastname','surname','familyname');
  const fullname=get('name','studentname','pupilname','fullname','student');
  const name=(firstname&&lastname)?`${firstname} ${lastname}`.trim():(firstname||lastname||fullname||null);
  if(!name)return null;
  const rawDate=get('cat4dateoftest','dateoftest','testdate','date','examdate','assessmentdate','sittingdate');
  const currentYear=get('currentyear','currentyeargroup','yeargroup','year','schoolyear','class','form','yearlevel');
  const Verbal=parseFloat(get('cat4verbalsas','verbal','verbalsas','verbalscore','ver','vsas'));
  const NonVerbal=parseFloat(get('cat4nonverbalsas','nonverbal','nonverbalsas','nonverbalscore','nv','nvsas','nonverbalfigural'));
  const Spatial=parseFloat(get('cat4spatialsas','spatial','spatialsas','spatialscore','spa'));
  const Quantitative=parseFloat(get('cat4quantitativesas','quantitative','quantitativesas','quantitativescore','quant','qsas'));
  const id=get('twuniqueid','id','studentid','pupilid','admissionnumber','upn','candidateid')||name;
  let testDate=rawDate?String(rawDate):null;
  if(testDate&&!isNaN(testDate)&&Number(testDate)>1000){
    try{const d=XLSX.SSF.parse_date_code(Number(testDate));testDate=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}catch(e){}
  }else if(testDate&&/^\d{2}\/\d{2}\/\d{4}$/.test(testDate)){
    const[dd,mm,yyyy]=testDate.split('/');testDate=`${yyyy}-${mm}-${dd}`;
  }
  return{id:String(id),name:String(name),currentYear:currentYear?String(currentYear):'Unknown',testDate:testDate||null,
    Verbal:isNaN(Verbal)?null:Verbal,'Non-Verbal':isNaN(NonVerbal)?null:NonVerbal,
    Spatial:isNaN(Spatial)?null:Spatial,Quantitative:isNaN(Quantitative)?null:Quantitative};
}

// ── File parsing ──────────────────────────────────────────────────────────────
function parseOneFile(file){
  return new Promise(resolve=>{
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='csv'){
      Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>resolve({rows:r.data.map(normaliseRow).filter(Boolean),cols:r.meta?.fields||[]})});
    }else{
      const reader=new FileReader();
      reader.onload=e=>{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{defval:'',raw:true});
        resolve({rows:raw.map(normaliseRow).filter(Boolean),cols:raw.length?Object.keys(raw[0]):[]});
      };
      reader.readAsArrayBuffer(file);
    }
  });
}

async function handleFiles(files){
  if(!files||!files.length)return;
  const batches=await Promise.all(Array.from(files).map(parseOneFile));
  const allCols=[...new Set(batches.flatMap(b=>b.cols))];
  const newRows=batches.flatMap(b=>b.rows);
  if(!newRows.length){showModal(allCols,0);return;}

  // Merge: remove sample data, merge with existing real data
  const existing=rawRows.filter(r=>!SAMPLE_IDS.has(r.id));
  const combined=[...existing,...newRows];
  const seen=new Set();
  rawRows=combined.filter(r=>{const k=`${r.id}__${r.testDate}`;if(seen.has(k))return false;seen.add(k);return true;});

  saveData(rawRows);
  updateStorageBadge(true);
  fileCount+=files.length;
  const ok=document.getElementById('upload-ok');
  ok.textContent=`✓ ${fileCount} file${fileCount>1?'s':''} loaded`;
  ok.style.display='';

  const firstCAT4=newRows.find(hasCAT4);
  if(firstCAT4)selectedId=firstCAT4.id;
  showModal(allCols,newRows.length);
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(cols,rowCount){
  document.getElementById('modal-title-text').textContent=
    rowCount>0?`✅ ${rowCount} records merged & saved`:'⚠️ No valid rows found';
  const body=document.getElementById('modal-body');
  const errHtml=rowCount===0?`<div style="background:rgba(248,113,113,.1);border:1px solid var(--rose);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--rose)">Parser couldn't find valid rows. Check column names below.</div>`:'';
  body.innerHTML=`${errHtml}
    <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Detected columns (${cols.length})</div>
    <div class="col-tags">${cols.map(c=>`<span class="col-tag">${c}</span>`).join('')||'<span style="color:var(--muted);font-size:12px">None</span>'}</div>
    <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Required columns</div>
    <table class="req-table" style="width:100%;border-collapse:collapse">
      <tr><td>Name</td><td>Firstname + Lastname (auto-joined) · name · studentName</td></tr>
      <tr><td>Current Year</td><td>currentYear · yearGroup · year · class · form</td></tr>
      <tr><td>CAT4 Date of Test</td><td>CAT4 - Date of Test · dateOfTest · testDate</td></tr>
      <tr><td>Verbal</td><td>CAT4 - Verbal SAS · verbal · verbalSAS</td></tr>
      <tr><td>Non-Verbal</td><td>CAT4 - Non Verbal SAS · nonVerbal · nonVerbalSAS</td></tr>
      <tr><td>Spatial</td><td>CAT4 - Spatial SAS · spatial · spatialSAS</td></tr>
      <tr><td>Quantitative</td><td>CAT4 - Quantitative SAS · quantitative · quantitativeSAS</td></tr>
    </table>`;
  document.getElementById('modal-btn-text').textContent=rowCount>0?'View Dashboard':'Close';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}

// ── Chart management ──────────────────────────────────────────────────────────
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}
function destroyAllCharts(){Object.keys(chartInstances).forEach(destroyChart);}

// ── Rendering ─────────────────────────────────────────────────────────────────
function setView(v){
  currentView=v;
  document.getElementById('tab-student').className='tab-btn'+(v==='student'?' active':'');
  document.getElementById('tab-cohort').className='tab-btn'+(v==='cohort'?' active':'');
  render();
}
function setBenchmark(b){
  benchmarkMode=b;
  document.getElementById('bench-national').className='toggle-btn'+(b==='national'?' active':'');
  document.getElementById('bench-cohort').className='toggle-btn'+(b==='cohort'?' active':'');
  render();
}
function selectStudent(id){selectedId=id;renderSidebar();renderMain();}
function toggleYear(yr){
  if(expandedYears.has(yr))expandedYears.delete(yr);else expandedYears.add(yr);
  renderSidebar();
}
function toggleCohortYear(yr){
  expandedCohortYear=(expandedCohortYear===yr)?null:yr;
  renderMain();
}

function render(){renderSidebar();renderMain();}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const sidebar=document.getElementById('sidebar');
  const tree=document.getElementById('sb-tree');
  if(currentView==='cohort'){renderCohortSidebar();return;}
  sidebar.style.display='flex';
  // ensure student sidebar structure
  if(!document.getElementById('sb-search'))return;

  const search=document.getElementById('search-input').value.toLowerCase();
  const allStudents=getAllStudents();
  const noCAT4=getNoCAT4Students();

  // Auto-expand selected student's year
  const yearMap=byYear(allStudents);
  for(const[yr,stus]of Object.entries(yearMap)){
    if(stus.find(s=>s.id===selectedId))expandedYears.add(yr);
  }

  let html='';
  if(search){
    // Search results
    const results=allStudents.filter(s=>s.name.toLowerCase().includes(search));
    if(!results.length){html='<div style="font-size:12px;color:var(--muted);padding:8px 4px">No results</div>';}
    else results.forEach(s=>{
      const lr=s.rows.filter(hasCAT4).sort((a,b)=>new Date(b.testDate)-new Date(a.testDate))[0];
      const avg=lr?meanSS(lr):0;
      html+=`<button class="stu-btn${s.id===selectedId?' active':''}" onclick="selectStudent('${s.id}')">
        <span class="sname">${s.name}</span>
        <span class="sscore">${lr?.currentYear||'–'} · SS ${avg}</span>
      </button>`;
    });
  }else{
    const sortedYears=Object.keys(yearMap).sort((a,b)=>yearSortKey(a)-yearSortKey(b));
    sortedYears.forEach(yr=>{
      const isOpen=expandedYears.has(yr);
      const stus=yearMap[yr];
      html+=`<button class="year-btn${isOpen?' open':''}" onclick="toggleYear('${yr}')">
        <span>${yr}</span>
        <span style="display:flex;align-items:center;gap:5px">
          <span class="year-badge">${stus.length}</span>
          <span style="font-size:9px">${isOpen?'▲':'▼'}</span>
        </span>
      </button>`;
      if(isOpen){
        stus.forEach(s=>{
          const lr=s.rows.filter(hasCAT4).sort((a,b)=>new Date(b.testDate)-new Date(a.testDate))[0];
          const avg=lr?meanSS(lr):0;
          const col=bandColor(avg);
          html+=`<button class="stu-btn${s.id===selectedId?' active':''}" onclick="selectStudent('${s.id}')">
            <span class="sname">${s.name}</span>
            <span class="sscore">SS ${avg} · <span style="color:${col}">${STANINE_LABEL[ssToStanine(avg)]}</span></span>
          </button>`;
        });
      }
    });
    // No CAT4 section
    if(noCAT4.length){
      const showNC=expandedYears.has('__nocat4__');
      html+=`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
        <button class="nocat4-btn" onclick="toggleYear('__nocat4__')">
          <span>No CAT4 Data</span>
          <span style="display:flex;align-items:center;gap:5px">
            <span class="year-badge">${noCAT4.length}</span>
            <span style="font-size:9px">${showNC?'▲':'▼'}</span>
          </span>
        </button>`;
      if(showNC){
        noCAT4.forEach(s=>{
          html+=`<div class="nocat4-item"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div><div style="font-size:10px;color:#475569">${s.currentYear}</div></div>`;
        });
      }
      html+='</div>';
    }
  }
  tree.innerHTML=html;
}

function renderCohortSidebar(){
  const sidebar=document.getElementById('sidebar');
  sidebar.innerHTML=`
    <div id="csb-label" style="padding:10px 10px 6px;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em">Year Group</div>
    <div id="csb-tree"></div>
    <div id="sb-upload" style="padding:8px 10px 10px;border-top:1px solid var(--border);margin-top:auto">
      <div class="upload-zone" onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="event.preventDefault();this.classList.remove('drag');handleFiles(event.dataTransfer.files)">
        <div class="uz-icon">📂</div>
        <div class="uz-label">Drop or click to upload</div>
        <div class="uz-sub">CSV / Excel</div>
      </div>
    </div>`;

  const allStudents=getAllStudents();
  const yearMap=byYear(allStudents);
  const sortedYears=Object.keys(yearMap).sort((a,b)=>yearSortKey(a)-yearSortKey(b));
  const active=expandedCohortYear;

  let html=`<button class="cohort-yr-btn${!active||active==='__all__'?' active':''}" onclick="toggleCohortYear('__all__')">
    <span>All Years</span><span class="year-badge">${allStudents.length}</span>
  </button>`;
  sortedYears.forEach(yr=>{
    html+=`<button class="cohort-yr-btn${active===yr?' active':''}" onclick="toggleCohortYear('${yr}')">
      <span>${yr}</span><span class="year-badge">${yearMap[yr].length}</span>
    </button>`;
  });
  document.getElementById('csb-tree').innerHTML=html;
}

// ── Main panel ────────────────────────────────────────────────────────────────
function renderMain(){
  destroyAllCharts();
  if(currentView==='student')renderStudentView();
  else renderCohortView();
}

function renderStudentView(){
  const main=document.getElementById('main');
  const allStudents=getAllStudents();
  if(!allStudents.length){main.innerHTML='<div style="color:var(--muted);padding:40px;text-align:center">No students loaded. Upload a file to get started.</div>';return;}
  let student=allStudents.find(s=>s.id===selectedId)||allStudents[0];
  selectedId=student.id;
  const latestRow=student.rows.filter(hasCAT4).sort((a,b)=>new Date(b.testDate)-new Date(a.testDate))[0];
  if(!latestRow){main.innerHTML='<div style="color:var(--muted);padding:40px;text-align:center">No CAT4 data for this student.</div>';return;}

  const avg=meanSS(latestRow);
  const stan=ssToStanine(avg);
  const bench=getBenchmark();
  const benchLabel=getBenchmarkLabel();
  const delta=trendDelta(student.rows);
  const trendHtml=delta===null?'<span class="trend-na">–</span>':
    `<span class="${delta>=0?'trend-up':'trend-dn'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}</span>`;
  const catRows=student.rows.filter(hasCAT4).sort((a,b)=>new Date(a.testDate)-new Date(b.testDate));

  // Domain cards HTML
  const domainCardsHtml=DOMAINS.map((d,i)=>{
    const score=latestRow[d];
    const diff=score!==null?score-(bench[d]||100):null;
    return `<div class="domain-card">
      <div class="dc-label" style="color:${D_COLORS[i]}">${d}</div>
      <div class="dc-score" style="color:${score?bandColor(score):'var(--muted)'}">${score??'–'}</div>
      <div class="dc-sub">${score?`Stanine ${ssToStanine(score)} · ${STANINE_LABEL[ssToStanine(score)]}`:''}</div>
      ${diff!==null?`<div class="dc-diff" style="color:${diff>=0?'var(--green)':'var(--rose)'}">${diff>=0?'+':''}${diff} vs ${benchmarkMode==='national'?'norm':'cohort'}</div>`:''}
    </div>`;
  }).join('');

  // History table
  const historyRows=catRows.map(r=>`<tr>
    <td>${fmtDate(r.testDate)}</td>
    ${DOMAINS.map((d,i)=>`<td style="color:${D_COLORS[i]}">${r[d]??'–'}</td>`).join('')}
    <td style="color:${bandColor(meanSS(r))};font-weight:700">${meanSS(r)}</td>
    <td>${ssToStanine(meanSS(r))}</td>
  </tr>`).join('');

  main.innerHTML=`
    <div class="stu-header">
      <div>
        <div class="stu-name">${student.name}</div>
        <div class="stu-meta">Current Year: <strong>${latestRow.currentYear}</strong> &nbsp;·&nbsp;
          ${catRows.length} CAT4 assessment${catRows.length!==1?'s':''} &nbsp;·&nbsp;
          Benchmark: <strong style="color:var(--amber)">${benchLabel}</strong>
        </div>
      </div>
      <div class="stat-pills">
        <div class="stat-pill"><div class="sp-label">Mean SS</div><div class="sp-value" style="color:${bandColor(avg)}">${avg}</div></div>
        <div class="stat-pill"><div class="sp-label">Stanine</div><div class="sp-value" style="color:var(--accent)">${stan}</div><div class="sp-sub">${STANINE_LABEL[stan]}</div></div>
        <div class="stat-pill"><div class="sp-label">Trend</div><div class="sp-value" style="font-size:16px;margin-top:4px">${trendHtml}</div></div>
      </div>
    </div>

    <div class="domain-cards">${domainCardsHtml}</div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Cognitive Profile — vs ${benchLabel}</div>
        <div class="chart-wrap"><canvas id="radar-chart" height="220"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Score Timeline</div>
        ${catRows.length>1
          ?'<div class="chart-wrap"><canvas id="line-chart" height="200"></canvas></div>'
          :'<div style="color:var(--muted);font-size:13px;padding:60px 0;text-align:center">Only one assessment — upload more files to see trends.</div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Assessment History</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>CAT4 Date</th>${DOMAINS.map(d=>`<th>${d}</th>`).join('')}<th>Mean SS</th><th>Stanine</th></tr></thead>
        <tbody>${historyRows}</tbody>
      </table></div>
    </div>`;

  // Draw radar chart
  setTimeout(()=>{
    const radarData=DOMAINS.map(d=>latestRow[d]||0);
    const benchData=DOMAINS.map(d=>bench[d]||100);
    const rCtx=document.getElementById('radar-chart');
    if(rCtx){
      chartInstances['radar']=new Chart(rCtx,{
        type:'radar',
        data:{
          labels:DOMAINS,
          datasets:[
            {label:'Student',data:radarData,borderColor:'#5b8dee',backgroundColor:'rgba(91,141,238,.2)',pointBackgroundColor:'#5b8dee',borderWidth:2},
            {label:benchLabel,data:benchData,borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,.08)',borderDash:[5,3],borderWidth:1.5,pointRadius:3}
          ]
        },
        options:{scales:{r:{min:70,max:140,ticks:{color:'#64748b',font:{size:9}},grid:{color:'#2a3050'},pointLabels:{color:'#94a3b8',font:{size:11}}}},plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}}}
      });
    }
    // Draw line chart
    if(catRows.length>1){
      const lCtx=document.getElementById('line-chart');
      const bAvg=Math.round(DOMAINS.reduce((s,d)=>s+(bench[d]||100),0)/4);
      if(lCtx){
        chartInstances['line']=new Chart(lCtx,{
          type:'line',
          data:{
            labels:catRows.map(r=>fmtDate(r.testDate)),
            datasets:[
              ...DOMAINS.map((d,i)=>({label:d,data:catRows.map(r=>r[d]),borderColor:D_COLORS[i],backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:D_COLORS[i],tension:.3})),
              {label:'Benchmark',data:catRows.map(()=>bAvg),borderColor:'#fbbf24',borderDash:[5,3],borderWidth:1.5,pointRadius:0,fill:false}
            ]
          },
          options:{scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#2a3050'}},y:{min:70,max:145,ticks:{color:'#64748b',font:{size:10}},grid:{color:'#2a3050'}}},plugins:{legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:12}}}}
        });
      }
    }
  },50);
}

function renderCohortView(){
  const main=document.getElementById('main');
  const allStudents=getAllStudents();
  const yearMap=byYear(allStudents);
  const activeYr=expandedCohortYear;
  const displayStudents=(!activeYr||activeYr==='__all__')?allStudents:(yearMap[activeYr]||allStudents);
  const bench=getBenchmark();
  const benchLabel=getBenchmarkLabel();
  const avg=cohortAvg(displayStudents.flatMap(s=>s.rows).filter(hasCAT4));

  const pillsHtml=DOMAINS.map((d,i)=>{
    const v=avg[d]||0;
    const diff=v-(bench[d]||100);
    return `<div class="stat-pill"><div class="sp-label" style="color:${D_COLORS[i]}">${d}</div>
      <div class="sp-value" style="color:${D_COLORS[i]}">${v}</div>
      <div class="sp-sub">${diff>=0?'+':''}${diff} vs ${benchmarkMode==='national'?'norm':'cohort'}</div>
    </div>`;
  }).join('');

  const tableRows=displayStudents.map(s=>{
    const lr=s.rows.filter(hasCAT4).sort((a,b)=>new Date(b.testDate)-new Date(a.testDate))[0];
    const av=meanSS(lr);
    const st=ssToStanine(av);
    const delta=trendDelta(s.rows);
    const tHtml=delta===null?'<span class="trend-na">–</span>':
      `<span class="${delta>=0?'trend-up':'trend-dn'}">${delta>=0?'▲':'▼'}${Math.abs(delta)}</span>`;
    const bc=bandColor(av);
    return `<tr class="clickable" onclick="selectStudent('${s.id}');setView('student')">
      <td class="nm">${s.name}</td>
      <td class="yr">${lr.currentYear}</td>
      <td>${fmtDate(lr.testDate)}</td>
      ${DOMAINS.map((d,i)=>`<td style="color:${D_COLORS[i]}">${lr[d]??'–'}</td>`).join('')}
      <td style="color:${bc};font-weight:700">${av}</td>
      <td>${st}</td>
      <td><span class="band" style="background:${bc}22;color:${bc}">${STANINE_LABEL[st]}</span></td>
      <td>${tHtml}</td>
    </tr>`;
  }).join('');

  main.innerHTML=`
    <div>
      <div class="stu-name">${(!activeYr||activeYr==='__all__')?'All Years':activeYr}</div>
      <div class="stu-meta">${displayStudents.length} students with CAT4 data · comparing vs <strong style="color:var(--amber)">${benchLabel}</strong></div>
    </div>
    <div class="stat-pills">${pillsHtml}</div>
    <div class="card">
      <div class="card-title">${(!activeYr||activeYr==='__all__')?'All Years':activeYr} — Average vs ${benchLabel}</div>
      <canvas id="bar-chart" height="180"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Students — Latest Results (click to view individual)</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Name</th><th>Year</th><th>CAT4 Date</th>${DOMAINS.map(d=>`<th>${d}</th>`).join('')}<th>Mean SS</th><th>Stanine</th><th>Band</th><th>Trend</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
    </div>`;

  setTimeout(()=>{
    const bCtx=document.getElementById('bar-chart');
    if(bCtx){
      chartInstances['bar']=new Chart(bCtx,{
        type:'bar',
        data:{
          labels:DOMAINS,
          datasets:[
            {label:'Cohort Avg',data:DOMAINS.map(d=>avg[d]||0),backgroundColor:'rgba(91,141,238,.7)',borderRadius:4},
            {label:benchLabel,data:DOMAINS.map(d=>bench[d]||100),backgroundColor:'rgba(251,191,36,.5)',borderRadius:4}
          ]
        },
        options:{scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#2a3050'}},y:{min:80,max:140,ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#2a3050'}}},plugins:{legend:{labels:{color:'#94a3b8',font:{size:11},boxWidth:14}}}}
      });
    }
  },50);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const saved=loadData();
  if(saved&&saved.length){
    rawRows=saved;
    const firstCAT4=saved.find(hasCAT4);
    if(firstCAT4)selectedId=firstCAT4.id;
    updateStorageBadge(true);
  }
  render();
});
</script>
